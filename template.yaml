AWSTemplateFormatVersion: '2010-09-09'

Transform: AWS::Serverless-2016-10-31

Description: >
  Cloud Resume Challenge Backend - Visitor Counter API

Globals:
  Function:
    Timeout: 5
    MemorySize: 128

  Api:
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"


Resources:

  VisitorCountTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH


  VisitsFunction:
    Type: AWS::Serverless::Function

    Properties:

      CodeUri: function/

      Handler: app.lambda_handler

      Runtime: python3.14

      Environment:
        Variables:
          TABLE_NAME: !Ref VisitorCountTable

      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitorCountTable

      Events:

        VisitorApi:
          Type: Api
          Properties:
            Path: /visitor-count
            Method: post

        VisitorOptions:
          Type: Api
          Properties:
            Path: /visitor-count
            Method: options



Outputs:

  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/visitor-count/"


  DynamoDBTableName:
    Description: "DynamoDB table name"
    Value: !Ref VisitorCountTable


  LambdaFunctionName:
    Description: "Lambda function name"
    Value: !Ref VisitsFunction
