AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Cloud Resume Challenge Backend - DynamoDB, Lambda, and API Gateway

  '
Globals:
  Function:
    Timeout: 5
    MemorySize: 128
Resources:
  VisitorCountTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: visitor-count
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  VisitsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: VisitsFunction
      Handler: app.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          TABLE_NAME:
            Ref: VisitorCountTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: VisitorCountTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /visitor-count
            Method: post
    Metadata:
      SamResourceId: VisitsFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL for Prod stage for Visitor Count
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/visitor-count/
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value:
      Ref: VisitorCountTable
